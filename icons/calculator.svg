  <rect x="114" y="144" width="28" height="20" rx="5" fill="#5a6472"/>
  <rect x="156" y="144" width="28" height="20" rx="5" fill="#3b5bdb"/>
  <!-- Boutons : rangée 2 -->
  <rect x="72" y="174" width="28" height="20" rx="5" fill="#5a6472"/>
  <rect x="114" y="174" width="28" height="20" rx="5" fill="#5a6472"/>
  <rect x="156" y="174" width="28" height="20" rx="5" fill="#3b5bdb"/>
  <!-- Bouton = large -->
  <rect x="72" y="204" width="70" height="20" rx="5" fill="#22c55e"/>
  <rect x="156" y="204" width="28" height="20" rx="5" fill="#3b5bdb"/>
